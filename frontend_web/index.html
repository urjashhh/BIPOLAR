<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARPATH - Mental Health Tracker</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-icon">❤️</div>
            <h1 class="app-title">POLARPATH</h1>
            <p class="app-subtitle">Track your journey to better mental health</p>
        </header>

        <div class="quote-section">
            <div class="quote-icon">🏆</div>
            <p class="quote-text" id="quoteText"></p>
        </div>

        <div class="chat-section">
            <a href="chat.html" class="chat-card">
                <div class="chat-header">
                    <span class="chat-icon">💬</span>
                    <h3 class="chat-title">What's happening?</h3>
                </div>
                <p class="chat-subtitle">Talk to your AI companion about how you're feeling</p>
            </a>
        </div>

        <div class="buttons-container">
            <a href="moods.html" class="feature-button moods-button">
                <span class="button-icon">😊</span>
                <span class="button-text">MOODS</span>
            </a>

            <a href="gratitude.html" class="feature-button gratitude-button">
                <span class="button-icon">📔</span>
                <span class="button-text">GRATITUDE JOURNAL</span>
            </a>

            <a href="routine.html" class="feature-button routine-button">
                <span class="button-icon">✓</span>
                <span class="button-text">ROUTINE</span>
            </a>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/index.js"></script>
</body>
</html>
